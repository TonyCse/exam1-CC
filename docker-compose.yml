version: '3'
services:
  frontend:
    build: ./frontend
    ports:
      - '3000:80'
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - '5000:5000'
    environment:
      - MONGO_URI=mongodb://mongo:27017/mydatabase
    depends_on:
      - mongo

  gateway:
    build: ./gateway
    ports:
      - '8000:8000'
    depends_on:
      - backend

  mongo:
    image: mongo
    ports:
      - '27018:27017'

  notifications:
    build: ./microservices/notifications
    ports:
      - '4002:4002'

  stock-management:
    build: ./microservices/stock-management
    ports:
      - '4003:4003'

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    ports:
      - '3001:3001'
    volumes:
      - uptime-kuma-data:/app/data
    restart: unless-stopped

volumes:
  uptime-kuma-data:
